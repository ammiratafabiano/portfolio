# =============================================================================
# Apache VirtualHost configuration for portfolio
# Copy this file to: /etc/apache2/sites-available/ammiratafabiano.dev.conf
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http rewrite ssl headers
#   sudo certbot --apache -d ammiratafabiano.dev
#   sudo systemctl restart apache2
# =============================================================================

<VirtualHost *:80>
    ServerName ammiratafabiano.dev

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =ammiratafabiano.dev
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName ammiratafabiano.dev

        ProxyPreserveHost On

        ProxyPass / http://127.0.0.1:8082/
        ProxyPassReverse / http://127.0.0.1:8082/

        RequestHeader set X-Forwarded-Proto "https"

        SSLCertificateFile /etc/letsencrypt/live/ammiratafabiano.dev/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/ammiratafabiano.dev/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf
    </VirtualHost>
</IfModule>
